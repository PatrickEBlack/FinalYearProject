<ion-content [fullscreen]="true">
  <!-- Banner Image with Text Overlay -->
  <div class="banner-container">
    <img src="../../../assets/images/shedLady.jpeg" alt="Add Livestock Banner" class="banner-image">
    <div class="banner-overlay">
      <div class="center-text">
        <h1>Add Livestock</h1>
      </div>
    </div>
  </div>

  <!-- Add Livestock Form -->
  <div class="form-container">
    <!-- Livestock Type Field -->
    <div class="form-field">
      <label class="required">Livestock:</label>
      <div class="select-wrapper">
        <select>
          <option value="" disabled selected>Pick your livestock...</option>
          <option value="cattle">Cattle</option>
          <option value="sheep">Sheep</option>
          <option value="goats">Chickens</option>
          <option value="pigs">Pigs</option>
          <option value="horses">Horses</option>
        </select>
        <div class="select-arrow">
          <ion-icon name="chevron-down-outline"></ion-icon>
        </div>
      </div>
    </div>

    <!-- Amount Field -->
    <div class="form-field">
      <label class="required">Amount:</label>
      <div class="select-wrapper">
        <select>
          <option value="" disabled selected>How many are you Adding?</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="10">10</option>
          <option value="20">20</option>
          <option value="custom">Custom Amount</option>
        </select>
        <div class="select-arrow">
          <ion-icon name="chevron-down-outline"></ion-icon>
        </div>
      </div>
    </div>

    <!-- Add Details Field -->
    <div class="form-field">
      <label class="required">Add Details Now?</label>
      <div class="yes-no-container">
        <div class="option-button">
          <div class="circle-button">
            <img src="../../../assets/images/tick.png" alt="Yes">
          </div>
          <span>Yes</span>
        </div>

        <div class="option-button">
          <div class="circle-button negative">
            <img src="../../../assets/images/x.png" alt="No">
          </div>
          <span>No</span>
        </div>
      </div>
      
      <div class="note-text">
        You can Always add them later
      </div>
    </div>
  </div>
</ion-content>
